<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>敲木鱼 · 积功德</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1612;
      --bg-glow: rgba(212, 168, 83, 0.06);
      --gold: #d4a853;
      --gold-light: #f0d78c;
      --gold-deep: #a67c2e;
      --text-muted: rgba(240, 215, 140, 0.45);
      --fish-shadow: rgba(0, 0, 0, 0.45);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg);
      color: var(--gold-light);
      cursor: none;
    }

    /* 木棒光标 */
    .mallet-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 48px;
      height: 48px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-12px, -38px);
      transition: transform 0.05s ease-out;
      will-change: transform;
    }

    .mallet-cursor svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
    }

    .mallet-cursor.hit {
      transform: translate(-12px, -28px) rotate(-18deg);
    }

    @media (hover: none) and (pointer: coarse) {
      body { cursor: auto; }
      .mallet-cursor { display: none; }
    }

    /* 背景微光 */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 55%, var(--bg-glow) 0%, transparent 70%);
    }

    /* 顶部功德计数 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: clamp(20px, 5vw, 40px) clamp(16px, 4vw, 32px);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    .merit-label {
      font-size: clamp(13px, 2.5vw, 15px);
      letter-spacing: 0.35em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .merit-count {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(42px, 10vw, 72px);
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(212, 168, 83, 0.35);
      transition: transform 0.15s ease, text-shadow 0.3s ease;
    }

    .merit-count.bump {
      transform: scale(1.08);
      text-shadow: 0 0 50px rgba(212, 168, 83, 0.7);
    }

    .combo-bar {
      margin-top: 10px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s, transform 0.25s;
    }

    .combo-bar.active {
      opacity: 1;
      transform: translateY(0);
    }

    .combo-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(18px, 4vw, 26px);
      color: var(--gold-light);
    }

    .combo-text.tier-2 { color: #ffd966; text-shadow: 0 0 12px rgba(255, 217, 102, 0.6); }
    .combo-text.tier-3 { color: #ffb347; text-shadow: 0 0 18px rgba(255, 179, 71, 0.8); }
    .combo-text.tier-4 {
      background: linear-gradient(90deg, #ffd966, #ff6b6b, #c77dff, #ffd966);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 1.2s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 200, 100, 0.6));
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    /* 木鱼区域 */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .fish-wrap {
      position: relative;
      width: clamp(260px, 58vw, 460px);
      aspect-ratio: 4 / 3;
      cursor: none;
    }

    @media (hover: none) and (pointer: coarse) {
      .fish-wrap { cursor: pointer; }
    }

    .fish-glow {
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 168, 83, 0.12) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .fish-wrap:active .fish-glow,
    .fish-wrap.knocking .fish-glow {
      opacity: 1;
    }

    .fish {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: lighten;
      -webkit-user-drag: none;
      transition: transform 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center 55%;
    }

    .fish-wrap.knocking .fish {
      transform: scale(0.96) translateY(3px);
    }

    .fish-wrap.combo-high .fish {
      filter: brightness(1.08) saturate(1.1);
    }

    /* 涟漪 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(212, 168, 83, 0.5);
      pointer-events: none;
      animation: ripple-out 0.7s ease-out forwards;
    }

    @keyframes ripple-out {
      from { transform: scale(0.3); opacity: 0.8; }
      to { transform: scale(2.2); opacity: 0; }
    }

    /* 飘字 */
    .float-text {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      font-family: 'Ma Shan Zheng', cursive;
      white-space: nowrap;
      animation: float-up var(--dur, 1s) ease-out forwards;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    @keyframes float-up {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(var(--scale-start, 1));
      }
      20% {
        transform: translate(-50%, calc(-50% - 20px)) scale(calc(var(--scale-start, 1) * 1.15));
      }
      100% {
        opacity: 0;
        transform: translate(-50%, calc(-50% - var(--rise, 80px))) scale(calc(var(--scale-start, 1) * 0.85));
      }
    }

    .float-text.tier-1 { color: var(--gold-light); font-size: clamp(22px, 5vw, 32px); }
    .float-text.tier-2 { color: #ffd966; font-size: clamp(28px, 6vw, 42px); text-shadow: 0 0 16px rgba(255, 217, 102, 0.7); }
    .float-text.tier-3 { color: #ffb347; font-size: clamp(34px, 7vw, 52px); text-shadow: 0 0 24px rgba(255, 140, 50, 0.8); }
    .float-text.tier-4 {
      font-size: clamp(40px, 8vw, 64px);
      background: linear-gradient(135deg, #fff5c3, #ffd966, #ff8c42, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px rgba(255, 200, 80, 0.9));
    }

    /* 粒子 */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 90;
      border-radius: 50%;
      animation: particle-fly var(--pdur, 0.8s) ease-out forwards;
    }

    @keyframes particle-fly {
      from { opacity: 1; transform: translate(0, 0) scale(1); }
      to { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }

    /* 屏幕闪 */
    .flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 80;
      background: radial-gradient(circle at var(--fx) var(--fy), rgba(255, 220, 120, 0.25) 0%, transparent 50%);
      opacity: 0;
      animation: flash-in 0.35s ease-out forwards;
    }

    @keyframes flash-in {
      0% { opacity: 0.7; }
      100% { opacity: 0; }
    }

    /* 底部提示 */
    .hint {
      position: fixed;
      bottom: clamp(20px, 5vw, 36px);
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(12px, 2.5vw, 14px);
      color: var(--text-muted);
      letter-spacing: 0.15em;
      pointer-events: none;
      z-index: 10;
    }

    /* 连击环 */
    .combo-ring {
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      border: 2px solid transparent;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .fish-wrap.combo-high .combo-ring {
      opacity: 1;
      border-color: rgba(255, 200, 80, 0.5);
      animation: ring-spin 3s linear infinite;
    }

    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .screen-shake {
      animation: shake 0.12s ease-out;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-2px, 1px); }
      75% { transform: translate(2px, -1px); }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>

  <header class="header">
    <div class="merit-label">累计功德</div>
    <div class="merit-count" id="meritCount">0</div>
    <div class="combo-bar" id="comboBar">
      <span class="combo-text" id="comboText"></span>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="fish-wrap" id="fishWrap">
      <div class="fish-glow"></div>
      <div class="combo-ring"></div>
      <img class="fish" src="./assets/muyu.png" alt="木鱼" draggable="false">
    </div>
  </main>

  <p class="hint" id="hint">点击木鱼，积攒功德</p>

  <div class="mallet-cursor" id="malletCursor">
    <svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="26" y="30" width="8" height="46" rx="3" fill="#8b6914"/>
      <rect x="27" y="31" width="3" height="44" rx="1.5" fill="#c4a035" opacity="0.5"/>
      <ellipse cx="30" cy="22" rx="16" ry="14" fill="#d4a853"/>
      <ellipse cx="30" cy="20" rx="14" ry="10" fill="#f0d78c" opacity="0.45"/>
      <ellipse cx="26" cy="18" rx="4" ry="3" fill="rgba(255,255,255,0.3)"/>
    </svg>
  </div>

  <script>
    const COMBO_WINDOW = 520;
    const COMBO_TIERS = [
      { min: 1, tier: 1 },
      { min: 4, tier: 2 },
      { min: 8, tier: 3 },
      { min: 15, tier: 4 },
    ];

    let merit = 0;
    let combo = 0;
    let lastKnock = 0;
    let comboTimer = null;
    let audioCtx = null;

    const meritCount = document.getElementById('meritCount');
    const comboBar = document.getElementById('comboBar');
    const comboText = document.getElementById('comboText');
    const fishWrap = document.getElementById('fishWrap');
    const stage = document.getElementById('stage');
    const malletCursor = document.getElementById('malletCursor');
    const hint = document.getElementById('hint');

    function getTier(c) {
      let t = 1;
      for (const row of COMBO_TIERS) {
        if (c >= row.min) t = row.tier;
      }
      return t;
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playKnockSound(comboLevel) {
      initAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      filter.type = 'bandpass';
      filter.frequency.value = 280 + comboLevel * 40;
      filter.Q.value = 8;

      osc.type = 'sine';
      osc.frequency.setValueAtTime(180 + comboLevel * 15, t);
      osc.frequency.exponentialRampToValueAtTime(90, t + 0.12);

      gain.gain.setValueAtTime(0.35 + comboLevel * 0.04, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.2);

      const noise = audioCtx.createBufferSource();
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
      noise.buffer = buf;
      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.08, t);
      nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      noise.connect(nGain);
      nGain.connect(audioCtx.destination);
      noise.start(t);
    }

    function updateComboUI() {
      if (combo >= 2) {
        comboBar.classList.add('active');
        const tier = getTier(combo);
        comboText.textContent = `${combo} 连击`;
        comboText.className = 'combo-text' + (tier >= 2 ? ` tier-${tier}` : '');
        fishWrap.classList.toggle('combo-high', tier >= 3);
      } else {
        comboBar.classList.remove('active');
        fishWrap.classList.remove('combo-high');
      }
    }

    function resetComboLater() {
      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => {
        combo = 0;
        updateComboUI();
      }, COMBO_WINDOW + 80);
    }

    function spawnRipple(x, y, tier) {
      const el = document.createElement('div');
      el.className = 'ripple';
      const size = 80 + tier * 20;
      el.style.cssText = `left:${x - size/2}px;top:${y - size/2}px;width:${size}px;height:${size}px;border-width:${1 + tier * 0.5}px;`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function spawnFloatText(x, y, tier) {
      const el = document.createElement('div');
      el.className = `float-text tier-${tier}`;
      el.textContent = '功德 +1';
      const scaleStart = 0.8 + tier * 0.15 + Math.min(combo, 30) * 0.02;
      const rise = 60 + tier * 25 + Math.min(combo, 20) * 3;
      const dur = 0.7 + tier * 0.15;
      el.style.cssText = `--scale-start:${scaleStart};--rise:${rise}px;--dur:${dur}s;left:${x}px;top:${y}px;font-size:${22 + tier * 8 + Math.min(combo, 25) * 1.2}px;`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function spawnParticles(x, y, count, tier) {
      const colors = ['#f0d78c', '#ffd966', '#ffb347', '#ff8c42', '#fff5c3'];
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const dist = 40 + tier * 25 + Math.random() * 30;
        const px = Math.cos(angle) * dist;
        const py = Math.sin(angle) * dist - 20;
        const size = 3 + tier + Math.random() * 4;
        p.style.cssText = `--px:${px}px;--py:${py}px;--pdur:${0.5 + Math.random() * 0.4}s;left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random() * colors.length)]};box-shadow:0 0 ${size * 2}px currentColor;`;
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    function spawnFlash(x, y, tier) {
      if (tier < 3) return;
      const el = document.createElement('div');
      el.className = 'flash';
      el.style.setProperty('--fx', `${(x / window.innerWidth) * 100}%`);
      el.style.setProperty('--fy', `${(y / window.innerHeight) * 100}%`);
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function knock(clientX, clientY) {
      initAudio();
      hint.style.opacity = '0';

      const now = Date.now();
      if (now - lastKnock < COMBO_WINDOW) {
        combo++;
      } else {
        combo = 1;
      }
      lastKnock = now;
      resetComboLater();

      merit++;
      meritCount.textContent = merit;
      meritCount.classList.add('bump');
      setTimeout(() => meritCount.classList.remove('bump'), 150);

      const tier = getTier(combo);
      updateComboUI();
      playKnockSound(tier);

      fishWrap.classList.add('knocking');
      setTimeout(() => fishWrap.classList.remove('knocking'), 100);

      if (tier >= 4) {
        stage.classList.add('screen-shake');
        setTimeout(() => stage.classList.remove('screen-shake'), 120);
      }

      const offsetY = -30 - tier * 10;
      spawnFloatText(clientX, clientY + offsetY, tier);
      spawnRipple(clientX, clientY, tier);

      if (tier >= 2) spawnParticles(clientX, clientY, 4 + tier * 2, tier);
      if (tier >= 3) spawnParticles(clientX, clientY, 6 + tier * 3, tier);
      spawnFlash(clientX, clientY, tier);
    }

    fishWrap.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      fishWrap.setPointerCapture(e.pointerId);
      knock(e.clientX, e.clientY);
      malletCursor.classList.add('hit');
    });

    fishWrap.addEventListener('pointerup', () => {
      malletCursor.classList.remove('hit');
    });

    document.addEventListener('pointermove', (e) => {
      if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) return;
      malletCursor.style.left = e.clientX + 'px';
      malletCursor.style.top = e.clientY + 'px';
    });

    document.addEventListener('pointerleave', () => {
      malletCursor.style.opacity = '0';
    });

    document.addEventListener('pointerenter', () => {
      malletCursor.style.opacity = '1';
    });

    window.addEventListener('load', () => {
      if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
        hint.textContent = '轻触木鱼，积攒功德';
      }
    });
  </script>
</body>
</html>
